<style>
    :root {
        --periwinkle: #CCCCFF;
        --dark-periwinkle: #7a7aff;
        --bg-color: #f8f8ff;
        --deep-blue: #00008B;
        --member-green: #20B2AA;
        --cam-pink: #FF69B4;
        --hot-red: #FF4500;
        
        /* 🔴 슈퍼열혈 색상: 눈에 확 띄고 고급스러운 크림슨 레드(#D32F2F)로 변경 */
        --super-red: #D32F2F; 
        
        --hover-blue: #e8e8ff;
        --hover-deep-blue: #e0e0ff;
        --hover-green: #e0fbf9;
        --hover-pink: #fff0f5;
        --hover-red: #fff0eb;
        
        /* 호버 배경도 붉은색에 맞춰 아주 연한 핑크빛 미색으로 조정 */
        --hover-super-red: #ffebee; 
    }
    
    body { background-color: var(--bg-color); font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
    .container { width: 100%; max-width: 500px; background: white; padding: 30px; border-radius: 30px; border: 5px solid var(--periwinkle); box-shadow: 0 10px 30px rgba(204, 204, 255, 0.3); }
    h2 { color: var(--dark-periwinkle); text-align: center; font-weight: 800; margin-bottom: 25px; font-size: 28px; }
    
    .section-title { font-size: 16px; font-weight: 800; margin: 25px 0 15px; color: #444; border-left: 6px solid; padding-left: 12px; }
    .normal-title { color: var(--dark-periwinkle); border-left-color: var(--periwinkle); }
    .big-hand-title { color: var(--deep-blue); border-left-color: var(--deep-blue); }
    .member-title { color: var(--member-green); border-left-color: var(--member-green); }
    .cam-title { color: var(--cam-pink); border-left-color: var(--cam-pink); }
    .hot-title { color: var(--hot-red); border-left-color: var(--hot-red); }
    /* 클래스 변수명도 super-red로 적용 완료 */
    .super-title { color: var(--super-red); border-left-color: var(--super-red); }
    
    #searchInput { width: 100%; padding: 18px; border: 2px solid #eee; border-radius: 15px; box-sizing: border-box; font-size: 16px; margin-bottom: 20px; }
    .list-container { height: 660px; overflow-y: auto; padding-right: 10px; }
    .list-container::-webkit-scrollbar { width: 8px; }
    .list-container::-webkit-scrollbar-thumb { background: var(--periwinkle); border-radius: 10px; }

    .list-item { display: flex; justify-content: space-between; align-items: center; height: 45px; padding: 0 15px; border-bottom: 1px solid #f9f9ff; border-radius: 8px; transition: all 0.2s; cursor: pointer; }
    .normal-sig .price { color: var(--dark-periwinkle); font-weight: 800; width: 60px; font-size: 16px; }
    .normal-sig:hover { background-color: var(--hover-blue); }
    .big-sig .price { color: var(--deep-blue); font-weight: 800; width: 60px; font-size: 16px; }
    .big-sig:hover { background-color: var(--hover-deep-blue); }
    .member-sig .price { color: var(--member-green); font-weight: 800; width: 60px; font-size: 16px; }
    .member-sig:hover { background-color: var(--hover-green); }
    .cam-sig .price { color: var(--cam-pink); font-weight: 800; width: 60px; font-size: 16px; }
    .cam-sig:hover { background-color: var(--hover-pink); }
    .hot-sig .price { color: var(--hot-red); font-weight: 800; width: 60px; font-size: 16px; }
    .hot-sig:hover { background-color: var(--hover-red); }
    /* 가격과 호버 부분도 super-red로 적용 완료 */

    .super-sig:hover { background-color: var(--hover-super-red); }
    .name { font-weight: 600; color: #444; font-size: 16px; text-align: right; }
</style>

function render(id, titleId, data, cls, q, catName) {
    const listEl = document.getElementById(id);
    const titleEl = document.getElementById(titleId);
    
    const filtered = data.filter(i => 
        i[0].includes(q) || i[1].toLowerCase().includes(q) || catName.toLowerCase().includes(q)
    );
    
    if (filtered.length === 0) {
        listEl.innerHTML = '';
        titleEl.style.display = 'none';
    } else {
        listEl.innerHTML = filtered.map(i => `<div class="list-item ${cls}"><span class="price">${i[0]}</span><span class="name">${i[1]}</span></div>`).join('');
        titleEl.style.display = 'block';
    }
}

function filterList() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    render('normalList', 'normTitle', normalData, 'normal-sig', q, "일반");
